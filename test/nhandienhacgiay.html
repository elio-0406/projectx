<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nhận diện Hạc Giấy</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md text-center">
    <h1 class="text-2xl font-bold mb-4">Nhận diện hạc giấy</h1>

    <input 
      type="file" 
      id="imageInput" 
      accept="image/*" 
      class="mb-4"
    />

    <div class="mb-4">
      <img 
        id="preview" 
        src="" 
        alt="Preview" 
        class="hidden max-h-64 mx-auto rounded-xl shadow"
      />
    </div>

    <button
      onclick="analyzeImage()"
      class="bg-blue-600 text-white px-6 py-3 rounded hover:bg-blue-700 transition"
    >
      Kiểm tra
    </button>

    <p id="result" class="mt-4 text-lg font-semibold"></p>
  </div>

  <script>
    const input = document.getElementById('imageInput');
    const preview = document.getElementById('preview');
    const resultText = document.getElementById('result');

    input.addEventListener('change', () => {
      const file = input.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = e => {
          preview.src = e.target.result;
          preview.classList.remove('hidden');
        };
        reader.readAsDataURL(file);
      }
    });

    async function analyzeImage() {
      const file = input.files[0];

      if (!file) {
        alert('Vui lòng chọn ảnh trước');
        return;
      }

      resultText.innerText = 'Đang phân tích...';

      const reader = new FileReader();

      reader.onload = async () => {
        const base64Image = reader.result.split(',')[1];

        try {
          const response = await fetch(
            `https://generativelanguage.googleapis.com/v1/models/gemini-2.5-flash:generateContent?key=AIzaSyCzZhxVoZFK9OMVSgLCRQxi1UyEsnEL5fo`,
            {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                contents: [
                  {
                    parts: [
                      {
                        text: 'Ảnh này có phải là hạc giấy origami không?'
                      },
                      {
                        inline_data: {
                          mime_type: 'image/jpeg',
                          data: base64Image
                        }
                      }
                    ]
                  }
                ]
              })
            }
          );

          const data = await response.json();

          const output = data.candidates?.[0]?.content?.parts?.[0]?.text || 'Không đọc được kết quả';

          resultText.innerText = output;

        } catch (error) {
          console.error(error);
          resultText.innerText = 'Lỗi khi gọi API';
        }
      };

      reader.readAsDataURL(file);
    }
  </script>

</body>
</html>
